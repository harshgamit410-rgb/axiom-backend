<!DOCTYPE html>
<html>
<head>
<title>My Apps</title>

<style>
body{
font-family:Arial;
margin:40px;
}

.card{
background:#f5f5f5;
padding:20px;
margin-bottom:15px;
border-radius:8px;
}

button{
padding:8px 12px;
margin-top:10px;
}
</style>

</head>

<body>

<h1>My Installed Apps</h1>

<div id="apps"></div>

<script>

fetch("/api/apps/installed")
.then(res=>res.json())
.then(data=>{

const container=document.getElementById("apps")

data.apps.forEach(app=>{

const div=document.createElement("div")

div.className="card"

div.innerHTML=`
<h3>${app.title}</h3>
<button onclick="run('${app.id}')">Run</button>
`

container.appendChild(div)

})

})

function run(id){
window.location="/app.html?id="+id
}

</script>

</body>
</html>
