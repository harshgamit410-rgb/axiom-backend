<!DOCTYPE html>
<html>
<head>
<title>Axiom Studio</title>

<style>

body{
font-family:Arial;
margin:40px;
background:#f5f5f5;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
max-width:500px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
}

button{
margin-top:15px;
padding:10px 15px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Axiom AI Studio</h1>

<div class="card">

<h3>Create AI Tool</h3>

<input id="title" placeholder="Tool name">

<textarea id="prompt" placeholder="Prompt template"></textarea>

<button onclick="create()">Create Tool</button>

</div>

<script>

function create(){

fetch("/api/studio/create",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
title:document.getElementById("title").value,
prompt:document.getElementById("prompt").value
})
})
.then(r=>r.json())
.then(d=>{
alert("Tool created!")
})

}

</script>

</body>
</html>
