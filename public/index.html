<!DOCTYPE html>
<html>
<head>
<title>Axiom Marketplace</title>
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<h1>Axiom AI Marketplace</h1>

<div id="tools"></div>

<script>

fetch("/api/tools/trending")
.then(r=>r.json())
.then(data=>{

const container=document.getElementById("tools")

data.tools.forEach(tool=>{

const div=document.createElement("div")

div.className="tool-card"

div.innerHTML=`
<h3>${tool.title}</h3>
<p>Runs: ${tool.runs}</p>
<button onclick="run('${tool.id}')">Run Tool</button>
`

container.appendChild(div)

})

})

function run(id){
window.location="/tool.html?id="+id
}

</script>

</body>
</html>
