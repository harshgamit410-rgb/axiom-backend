<!DOCTYPE html>
<html>

<head>
<title>Creator Dashboard</title>
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<h1>Creator Dashboard</h1>

<div id="stats"></div>

<script>

const creator="e1824a28-fa3c-4a43-85fd-40afbb0f701b"

fetch("/api/creator/stats/"+creator)
.then(r=>r.json())
.then(data=>{

document.getElementById("stats").innerHTML=`

<p>Tools Created: ${data.tools}</p>
<p>Total Runs: ${data.total_runs}</p>
<p>Total Revenue: $${data.total_revenue}</p>

`

})

</script>

</body>
</html>
