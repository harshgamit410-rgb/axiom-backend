<!DOCTYPE html>
<html>
<head>
<title>My Apps</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
}

h1{
font-size:36px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

button{
background:#22c55e;
border:none;
padding:10px 20px;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

</style>
</head>

<body>

<h1>My Installed AI Apps</h1>

<div id="apps"></div>

<script>

fetch("/api/apps/installed")
.then(r=>r.json())
.then(data=>{

const container=document.getElementById("apps")

data.apps.forEach(app=>{

const div=document.createElement("div")

div.className="card"

div.innerHTML=`
<h3>${app.title}</h3>
<button onclick="run('${app.id}')">Run</button>
`

container.appendChild(div)

})

})

function run(id){
window.location="/app.html?id="+id
}

</script>

</body>
</html>
