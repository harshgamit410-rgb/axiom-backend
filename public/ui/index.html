<!DOCTYPE html>
<html>
<head>
<title>Axiom</title>
<style>
body{background:#0f0f0f;color:white;font-family:sans-serif;padding:40px}
input,button{padding:10px;margin:5px}
.tool{border:1px solid #333;padding:15px;margin:10px 0}
</style>
</head>

<body>

<h1>Axiom Studio</h1>

<input id="input" placeholder="Describe something..." />
<button onclick="runTool()">Run AI Tool</button>

<pre id="output"></pre>

<h2>Workspace Files</h2>
<div id="files"></div>

<script>

const API="http://localhost:4000"

const toolId="33c30562-7391-4410-8c49-71ee4efefd62"
const projectId="5d96a8bf-9b96-4836-b58d-f8f85da589fe"
const userId="e1824a28-fa3c-4a43-85fd-40afbb0f701b"

async function runTool(){

const input=document.getElementById("input").value

const res=await fetch(API+"/api/tools/run",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({toolId,projectId,userId,input})
})

const data=await res.json()

document.getElementById("output").innerText=data.output

loadFiles()

}

async function loadFiles(){

const res=await fetch(API+"/api/workspace/files/"+projectId)

const data=await res.json()

const container=document.getElementById("files")

container.innerHTML=""

data.files.forEach(f=>{
const div=document.createElement("div")
div.className="tool"
div.innerText=f.content
container.appendChild(div)
})

}

loadFiles()

</script>

</body>
</html>
