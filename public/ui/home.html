<!DOCTYPE html>
<html>
<head>
<title>Axiom Home</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

.nav{
background:#1e293b;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.nav h2{
margin:0;
}

.nav button{
background:#22c55e;
border:none;
padding:8px 16px;
border-radius:6px;
color:white;
cursor:pointer;
}

.container{
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
}

.card button{
margin-top:10px;
background:#22c55e;
border:none;
padding:8px 16px;
border-radius:6px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="nav">
<h2>Axiom</h2>
<button onclick="logout()">Logout</button>
</div>

<div class="container">

<h1>Welcome to Axiom</h1>
<p>Create, explore AI tools, and manage your workspace.</p>

<div class="grid">

<div class="card">
<h3>AI Studio</h3>
<p>Run AI tools</p>
<button onclick="location.href='/ui/studio.html'">Open</button>
</div>

<div class="card">
<h3>Marketplace</h3>
<p>Explore tools</p>
<button onclick="alert('Marketplace UI coming soon')">Open</button>
</div>

<div class="card">
<h3>Workspace</h3>
<p>Your projects</p>
<button onclick="alert('Workspace UI coming soon')">Open</button>
</div>

</div>

</div>

<script>

function logout(){
localStorage.removeItem("token")
location.href="/"
}

</script>

</body>
</html>
