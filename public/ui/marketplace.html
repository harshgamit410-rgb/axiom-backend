<!DOCTYPE html>
<html>
<head>
<title>Axiom Marketplace</title>
<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
padding:30px;
}
.nav{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}
.nav a{
background:#22c55e;
color:white;
text-decoration:none;
padding:10px 16px;
border-radius:6px;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
}
.card{
background:#1e293b;
padding:20px;
border-radius:12px;
}
.card p{
color:#cbd5e1;
}
button{
margin-top:10px;
background:#22c55e;
border:none;
padding:10px 16px;
border-radius:6px;
color:white;
cursor:pointer;
}
</style>
</head>
<body>
<div class="nav">
<h1>Axiom Marketplace</h1>
<a href="/ui/home.html">Back Home</a>
</div>

<div class="grid" id="tools"></div>

<script>
async function loadMarketplace(){
const res = await fetch("/api/tools/marketplace")
const data = await res.json()
const container = document.getElementById("tools")
container.innerHTML = ""

data.tools.forEach(tool=>{
const div = document.createElement("div")
div.className = "card"
div.innerHTML = `
<h3>${tool.title}</h3>
<p>Run this AI tool inside Axiom Studio.</p>
<button onclick="location.href='/ui/studio.html'">Open in Studio</button>
`
container.appendChild(div)
})
}
loadMarketplace()
</script>
</body>
</html>
