<!DOCTYPE html>
<html>
<head>
<title>Axiom AI Studio</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
padding:30px;
}

h1{
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.tool{
background:#1e293b;
padding:20px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

button{
margin-top:10px;
padding:10px;
background:#22c55e;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

#output{
margin-top:40px;
background:#1e293b;
padding:20px;
border-radius:10px;
white-space:pre-wrap;
}
</style>
</head>

<body>

<h1>Axiom AI Studio</h1>

<div class="grid" id="tools"></div>

<h2>Output</h2>
<div id="output">Run a tool to see results...</div>

<script>

const USER="e1824a28-fa3c-4a43-85fd-40afbb0f701b"
const PROJECT="5d96a8bf-9b96-4836-b58d-f8f85da589fe"

async function loadTools(){

const res = await fetch("/api/tools/marketplace")
const data = await res.json()

const container = document.getElementById("tools")

data.tools.forEach(tool=>{

const div=document.createElement("div")
div.className="tool"

div.innerHTML=\`
<h3>\${tool.title}</h3>
<input id="input-\${tool.id}" placeholder="Describe something...">
<button onclick="runTool('\${tool.id}')">Run Tool</button>
\`

container.appendChild(div)

})

}

async function runTool(id){

const input=document.getElementById("input-"+id).value

const res=await fetch("/api/tools/run",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
toolId:id,
userId:USER,
projectId:PROJECT,
input
})
})

const data=await res.json()

document.getElementById("output").innerText=data.output

}

loadTools()

</script>

</body>
</html>
